name = "plugin-files"
shown_name = "Files"
version = "0.7.2"
description = "File storage + a standalone file-browser UI, with agent file tools."
entry = "plugin_files"
sdk_version = "0"
license = "MIT"
provider = "storage"
tags = ["files", "storage", "ui"]
readme = """
# plugin-files

Gives Luna a file store, agent file tools, and a **Files** sidebar item with a
standalone file-browser UI (list, upload, preview, rename, delete). It is the
sanctioned `StorageProvider` (registry key `storage`) any plugin persists bytes
through.

**Pluggable backends (002).** One plugin, four backends behind a single seam —
the plugin reports its own durability via `file_storage_status`:
- `local` — local disk (dev; ephemeral on containers).
- `fly` — local disk on a mounted **Fly volume** (fast NVMe, persists across deploys).
- `object` — S3-compatible object storage: **Tigris** (Fly-native) or **Cloudflare R2**
  (durable, machine-independent; not a code workspace — no in-place edits).
- `db` — bytes in the per-agent Postgres (`plugin_files_blobs`); zero-infra durable.

Tools: `file_list`, `file_read`, `file_write`, `file_mkdir`, `file_delete`,
`file_move`, `file_storage_status`. Routes are auth-gated via the SDK
(`get_current_user`); the UI is served from the plugin's own `ui/` dir. Built
against `luna_sdk` v0 — no `import luna.*`.

Config (env): `LUNA_FILES_BACKEND` (`auto`|`local`|`fly`|`object`|`db`),
`LUNA_FILES_ROOT` (default `~/.luna/files`), `LUNA_FILES_DURABLE` (declare a
durable disk), `LUNA_FILES_MAX_SIZE_GB`, `LUNA_FILES_MAX_FILE_MB`,
`LUNA_FILES_S3_*` (endpoint/key/secret/bucket/prefix for `object`).

Source: https://github.com/huemorgan/plugin-files
"""

[requires]
tools = 7

[[tools]]
name = "file_list"
description = "List files and folders in a directory."
policy = "auto_approve"
risk_level = "low"

[[tools]]
name = "file_read"
description = "Read a text file's content."
policy = "auto_approve"
risk_level = "low"

[[tools]]
name = "file_write"
description = "Write text content to a file."
policy = "prompt_always"
risk_level = "low"

[[tools]]
name = "file_mkdir"
description = "Create a directory (and parents)."
policy = "auto_approve"
risk_level = "low"

[[tools]]
name = "file_delete"
description = "Delete a file or directory."
policy = "prompt_always"
risk_level = "high"

[[tools]]
name = "file_move"
description = "Move or rename a file or directory."
policy = "prompt_always"
risk_level = "low"

[[tools]]
name = "file_storage_status"
description = "Report the file store's backend, durability, location and usage."
policy = "auto_approve"
risk_level = "low"

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Files — Luna</title>
  <link rel="stylesheet" href="vendor/highlight-theme.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <span class="header-title">Files</span>
        <nav id="breadcrumb" class="breadcrumb" aria-label="Path"></nav>
      </div>
      <div class="header-right">
        <div class="filter-wrap">
          <svg class="filter-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input id="filter" class="filter-input" type="text" placeholder="Filter…" spellcheck="false" autocomplete="off">
        </div>
        <div id="usage" class="usage-bar"></div>
        <button id="btn-upload" class="btn btn-primary" title="Upload file">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          Upload
        </button>
        <button id="btn-mkdir" class="btn" title="New folder">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button id="btn-view" class="btn" title="Toggle list / grid view">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </button>
      </div>
    </header>
    <div id="main">
      <div id="tree-pane">
        <div id="tree" class="tree"></div>
        <div id="drop-zone" class="drop-zone">Drop files here to upload</div>
      </div>
      <div id="content-pane">
        <div id="content-placeholder" class="placeholder">Select a file to preview</div>
        <div id="content-viewer" class="viewer hidden"></div>
      </div>
    </div>
    <footer id="status-bar">
      <span id="status-text">Ready</span>
      <span id="storage-indicator" class="storage-indicator hidden">
        <span id="storage-dot" class="storage-dot"></span>
        <span id="storage-label"></span>
        <span id="storage-info" class="storage-info" tabindex="0" role="button" aria-label="What does this storage type mean?">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          <span id="storage-tooltip" class="storage-tooltip"></span>
        </span>
      </span>
      <span id="version" class="version">v0.7.0</span>
    </footer>
  </div>
  <div id="upload-progress" class="upload-progress hidden"></div>
  <div id="toast-host" class="toast-host"></div>
  <input type="file" id="file-input" multiple style="display:none">
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/purify.min.js"></script>
  <script src="vendor/papaparse.min.js"></script>
  <script src="vendor/highlight.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
